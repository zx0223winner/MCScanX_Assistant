names:
  - Athaliana
  - Creinhardtii

# Warning! Make sure your species name above without '.', '_', for example don't use Arabidopisis_thalina or A.thalina or A.thalina_sp
# if you really want to differ the strains from same speceis. Do it like Athaliana-sp1, Athaliana-sp2 etc.
# This is because DupGeneFinder capture species name using . and _ as delimiter. I don't have an easy fix to allow more flexibility.

ncbi_genomes:
    Athaliana:
        assembly: "XX/XX.fasta"
        gff: "XX/XX.gff"
        species: Athaliana

    Creinhardtii:
        assembly:  "XX/XX.fasta"
        gff: "XX/XX.gff"
        species: Creinhardtii

# note here species_name is used by the snakemake file : Snakefile_Ks_distribution_plot, which is targeting for MCScanX run within one geneome, e,g., intra-species
species_name:
    - Athaliana
#    - Creinhardtii

# note here species_name is used by the snakemake file : Snakefile_MCScanX_6species, which is targeting for MCScanX run across many geneomes, e,g., inter-species
ks_test_name: 
  - "6species"
